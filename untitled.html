<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DropSync Elite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #007aff;
            --bg: #ffffff;
            --card: #f2f2f7;
            --text: #1c1c1e;
            --sub: #8e8e93;
            --border: rgba(0,0,0,0.05);
        }

        /* Automatic Dark Mode Selection */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1c1c1e;
                --text: #ffffff;
                --sub: #8e8e93;
                --border: rgba(255,255,255,0.1);
            }
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; outline: none; }
        
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Professional Header */
        nav {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 19px; letter-spacing: -0.5px; }
        .status { font-size: 10px; font-weight: 700; padding: 5px 12px; border-radius: 20px; background: var(--card); color: var(--accent); text-transform: uppercase; }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* Connection Hero Card */
        .hero { background: var(--card); border-radius: 32px; padding: 40px 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        #qrcode { background: white; padding: 15px; border-radius: 22px; display: inline-block; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .code-text { font-size: 36px; font-weight: 900; color: var(--accent); letter-spacing: 2px; margin: 10px 0; }
        
        .input-area { width: 100%; margin-top: 30px; }
        input { 
            width: 100%; padding: 18px; border-radius: 16px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 16px; text-align: center; margin-bottom: 12px;
        }
        .btn-prime { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            background: var(--accent); color: white; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        /* Transfer Items */
        #activeList { width: 100%; max-width: 480px; display: none; }
        .file-item { 
            background: var(--card); padding: 16px; border-radius: 24px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px; border: 1px solid var(--border);
            animation: slideIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } }

        /* Smart Icons */
        .icon-circle { 
            width: 48px; height: 48px; border-radius: 14px; display: flex; 
            align-items: center; justify-content: center; flex-shrink: 0; color: white;
        }
        .icon-img { background: #34c759; }
        .icon-vid { background: #ff9500; }
        .icon-doc { background: #007aff; }
        .icon-aud { background: #af52de; }
        .icon-def { background: #8e8e93; }

        .info { flex: 1; min-width: 0; }
        .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track { height: 4px; background: rgba(128,128,128,0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .bar { height: 100%; background: var(--accent); width: 0%; transition: 0.2s; }

        /* Float Action */
        .fab { 
            position: fixed; bottom: 30px; right: 30px; width: 64px; height: 64px; 
            background: var(--accent); color: white; border-radius: 32px; border: none;
            box-shadow: 0 12px 30px rgba(0,122,255,0.3); cursor: pointer; display: none;
            align-items: center; justify-content: center; z-index: 100;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo">DropSync <span style="font-weight:300; opacity:0.6;">ELITE</span></div>
    <div id="status" class="status">Offline</div>
</nav>

<main>
    <div id="setup" class="hero">
        <div id="qrcode"></div>
        <div class="code-text" id="myId">-----</div>
        <p style="font-size: 13px; color: var(--sub);">Encrypted P2P Link</p>
        
        <div class="input-area">
            <input type="text" id="peerCode" placeholder="Enter Peer Code" maxlength="5">
            <button class="btn-prime" onclick="link()">Connect</button>
        </div>
    </div>

    <div id="activeList">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; padding:0 5px;">
            <h4 style="margin:0">Transfers</h4>
            <span id="speed" style="font-size:11px; font-weight:bold; color:var(--accent)">0 MB/s</span>
        </div>
        <div id="fileContainer"></div>
    </div>
</main>

<button id="fab" class="fab" onclick="document.getElementById('fileIn').click()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
</button>
<input type="file" id="fileIn" multiple class="hidden">

<script>
/** FIREBASE CONFIG **/
const firebaseConfig = {
    apiKey: "AIzaSyCjNC99Asz061_JAY-bLoMvkNyz7d1lAlc",
    authDomain: "pixelcode-ada70.firebaseapp.com",
    databaseURL: "https://pixelcode-ada70-default-rtdb.firebaseio.com",
    projectId: "pixelcode-ada70",
    storageBucket: "pixelcode-ada70.firebasestorage.app",
    messagingSenderId: "85513319641",
    appId: "1:85513319641:web:66e0485d718229b4dafac8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const myId = Math.random().toString(36).substring(2, 7).toUpperCase();
let pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
let dc = null;

/** UI SETUP **/
document.getElementById('myId').textContent = myId;
new QRCode(document.getElementById("qrcode"), { text: myId, width: 170, height: 170, colorDark: "#000", colorLight: "#fff" });

const getIconData = (name) => {
    const ext = name.split('.').pop().toLowerCase();
    if(['jpg','png','webp','gif'].includes(ext)) return { c: 'icon-img', s: '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2z"></path><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>' };
    if(['mp4','mov','avi'].includes(ext)) return { c: 'icon-vid', s: '<polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>' };
    if(['pdf','doc','docx','txt'].includes(ext)) return { c: 'icon-doc', s: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>' };
    if(['mp3','wav'].includes(ext)) return { c: 'icon-aud', s: '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>' };
    return { c: 'icon-def', s: '<path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>' };
};

/** LOGIC **/
async function start() {
    const ref = db.ref('rooms/' + myId);
    dc = pc.createDataChannel("p2p"); setup(dc);
    pc.onicecandidate = e => e.candidate && ref.child('o_ice').push(e.candidate.toJSON());
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await ref.set({ offer: { type: offer.type, sdp: offer.sdp } });
    ref.on('value', async s => { if(!pc.currentRemoteDescription && s.val()?.answer) await pc.setRemoteDescription(new RTCSessionDescription(s.val().answer)); });
    ref.child('a_ice').on('child_added', s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
    document.getElementById('status').textContent = "Waiting";
}
start();

async function link() {
    const rid = document.getElementById('peerCode').value.toUpperCase();
    const ref = db.ref('rooms/' + rid);
    pc.ondatachannel = e => setup(e.channel);
    pc.onicecandidate = e => e.candidate && ref.child('a_ice').push(e.candidate.toJSON());
    const snap = await ref.once('value');
    await pc.setRemoteDescription(new RTCSessionDescription(snap.val().offer));
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    await ref.update({ answer: { type: ans.type, sdp: ans.sdp } });
    ref.child('o_ice').on('child_added', s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
}

let active = {};
function setup(chan) {
    dc = chan; dc.binaryType = 'arraybuffer';
    dc.onopen = () => {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('activeList').style.display = 'block';
        document.getElementById('fab').style.display = 'flex';
        document.getElementById('status').textContent = "Linked";
    };
    dc.onmessage = e => {
        if(typeof e.data === 'string') {
            const m = JSON.parse(e.data);
            createUI(m.id, m.n);
            active[m.id] = { m, c: [] };
        } else {
            const v = new Uint8Array(e.data);
            const id = new TextDecoder().decode(v.slice(0, 5));
            active[id].c.push(e.data.slice(5));
            const p = (active[id].c.length * 16384 / active[id].m.s) * 100;
            document.getElementById('b-'+id).style.width = p + '%';
            if(p >= 100) done(id);
        }
    };
}

function createUI(id, n) {
    const icon = getIconData(n);
    const div = document.createElement('div');
    div.id = 'i-'+id; div.className = 'file-item';
    div.innerHTML = `
        <div class="icon-circle ${icon.c}"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${icon.s}</svg></div>
        <div class="info">
            <div class="name">${n}</div>
            <div class="track"><div class="bar" id="b-${id}"></div></div>
        </div>
        <button id="s-${id}" class="hidden btn-prime" style="width:auto; padding:8px 12px; font-size:11px;">SAVE</button>
    `;
    document.getElementById('fileContainer').prepend(div);
}

function done(id) {
    const b = document.getElementById('s-'+id);
    b.classList.remove('hidden');
    b.onclick = () => {
        const bl = new Blob(active[id].c);
        const a = document.createElement('a'); a.href = URL.createObjectURL(bl); a.download = active[id].m.n; a.click();
        document.getElementById('i-'+id).remove();
    };
}

document.getElementById('fileIn').onchange = async (e) => {
    for(let f of e.target.files) {
        const id = Math.random().toString(36).substring(2, 7);
        createUI(id, f.name);
        dc.send(JSON.stringify({id, n: f.name, s: f.size}));
        const reader = f.stream().getReader();
        const head = new TextEncoder().encode(id);
        let sent = 0; let start = Date.now();
        while(true) {
            const {done, value} = await reader.read();
            if(done) break;
            for(let i=0; i<value.length; i+=16384) {
                const chunk = value.slice(i, i+16384);
                const pk = new Uint8Array(head.length + chunk.length);
                pk.set(head); pk.set(chunk, head.length);
                dc.send(pk);
            }
            sent += value.length;
            document.getElementById('b-'+id).style.width = (sent/f.size)*100 + '%';
            document.getElementById('speed').textContent = (sent/1e6/((Date.now()-start)/1000)).toFixed(1) + " MB/s";
        }
    }
};
</script>
</body>
</html>
